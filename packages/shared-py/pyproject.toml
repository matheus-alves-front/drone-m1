[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "drone-scenarios"
version = "0.1.0"
description = "Reusable MAVSDK scenario runner for the drone simulation-first monorepo"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
mavsdk = ["mavsdk"]
test = ["pytest>=8,<9"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
