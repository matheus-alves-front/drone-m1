    hover_duration_s: 3.0
    waypoint_arrival_tolerance_m: 2.0
    home_arrival_tolerance_m: 2.0
    arm_timeout_s: 30.0
    takeoff_timeout_s: 45.0
    waypoint_timeout_s: 60.0
    return_home_timeout_s: 60.0
    landing_timeout_s: 60.0
    abort_timeout_s: 90.0
    command_timeout_s: 10.0
    command_retry_interval_s: 3.0
    max_command_retries: 5
    patrol_offsets_north_m: [20.0]
    patrol_offsets_east_m: [0.0]
